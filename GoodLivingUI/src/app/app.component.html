<!-- Page Content -->
<div class="container">
  <div class="row">
    <div class="col-lg-12 text-center">
      <h5>Dropdown and Templating</h5>
      <p-autoComplete [(ngModel)]="selectedCountryAdvanced" [suggestions]="filteredCountries"
        (completeMethod)="filterCountry($event)" field="name">
        <ng-template let-country pTemplate="item">
          <div class="country-item">
            <img src="assets/showcase/images/demo/flag/flag_placeholder.png"
              [class]="'flag flag-' + country.code.toLowerCase()" />
            <div>{{country.name}}</div>
          </div>
        </ng-template>
      </p-autoComplete>
    </div>
  </div>
</div>
